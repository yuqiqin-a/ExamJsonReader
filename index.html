<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超有爱题库渲染编辑器</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>超有爱题库渲染编辑器</h1>
      <p>Built by 曲奇🍪, Web Service Support from 日天&杨哥 | Created with ChatGPT Codex</p>
    </header>

    <main class="app-grid">
      <section class="panel panel-files" aria-label="File manager">
        <div class="panel-head">
          <h2>文件窗口</h2>
          <div class="file-actions">
            <button id="addFilesBtn" class="btn" type="button">添加文件</button>
            <input id="filePicker" type="file" accept=".json,application/json" multiple />
            <button id="addFolderBtn" class="btn" type="button">添加文件夹</button>
            <input id="folderPicker" type="file" accept=".json,application/json" webkitdirectory directory multiple />
          </div>
        </div>
        <ul id="fileList" class="file-list" aria-live="polite"></ul>
      </section>

      <section class="panel panel-preview" aria-label="Rendered preview">
        <div class="panel-head">
          <h2>渲染窗口</h2>
          <span id="previewMeta" class="meta"></span>
        </div>
        <div id="preview" class="preview"></div>
      </section>

      <section class="panel panel-editor" aria-label="JSON editor">
        <div class="panel-head">
          <h2>编辑窗口</h2>
          <div class="editor-actions">
            <button id="editMetaBtn" class="btn" type="button">编辑Meta</button>
            <button id="spacifyBtn" class="btn" type="button">空格修复</button>
            <button id="exportTxtBtn" class="btn" type="button">导出txt</button>
            <button id="saveAsBtn" class="btn" type="button">另存为</button>
          </div>
        </div>
        <div id="editorStatus" class="editor-status meta"></div>
        <div class="editor-shell">
          <pre id="highlight" class="highlight" aria-hidden="true"></pre>
          <textarea id="editor" spellcheck="false" aria-label="Editable JSON source"></textarea>
        </div>
      </section>
    </main>

    <div id="metaModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="metaModalTitle">
        <div class="modal-head">
          <h3 id="metaModalTitle">编辑Meta</h3>
        </div>
        <form id="metaForm" class="modal-form">
          <label>articleId <input name="articleId" type="number" /></label>
          <label>wordType
            <select name="wordType"></select>
          </label>
          <label>region <input name="region" type="text" /></label>
          <label>examId
            <select name="examId"></select>
          </label>
          <label>exam <input name="exam" type="text" /></label>
          <label>year <input name="year" type="number" /></label>
          <label>month <input name="month" type="number" min="1" max="12" /></label>
          <label>articleType
            <select name="articleType"></select>
          </label>
          <div class="modal-actions">
            <button id="metaCancelBtn" class="btn btn-muted" type="button">取消</button>
            <button class="btn" type="submit">保存Meta</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="./src/main.js"></script>
  </body>
</html>
